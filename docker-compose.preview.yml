services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ccc_db
      POSTGRES_USER: ccc_user
      POSTGRES_PASSWORD: ccc_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://ccc_user:ccc_pass@postgres:5432/ccc_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: replace_me_access_secret
      JWT_REFRESH_SECRET: replace_me_refresh_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      STRIPE_SECRET_KEY: sk_test_replace_me
      STRIPE_WEBHOOK_SECRET: whsec_replace_me
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
