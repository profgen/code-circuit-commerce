services:
  postgres:
    image: postgres:16-alpine
    container_name: ccc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ccc_db
      POSTGRES_USER: ccc_user
      POSTGRES_PASSWORD: ccc_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ccc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
